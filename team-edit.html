                                </div> 
                                <div class="mb-3">

                                    <select class="form-select" multiple>
                                        <option>เชียงใหม่</option>
                                        <option>ลำพูน</option>
                                        <option>ลำปาง</option>
                                        <option>เชียงราย</option>
                                    </select>
                                    <small class="text-muted">เลือกได้มากกว่า 1 จังหวัด</small>
                                </div> 
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">รายชื่อเจ้าหน้าที่ลงพื้นที่</label>

                                    <!-- ช่องค้นหา -->

                                        type="text"
                                        class="form-control mb-2"

                                        </span>
                                    </div>

                                    <!-- รายชื่อสมาชิก -->

                                        <!-- สมาชิก -->
                                        <label class="list-group-item d-flex align-items-start">
                                            <input class="form-check-input me-3 mt-1 member-checkbox" type="checkbox">
                                            <div class="flex-grow-1">
                                                <div class="fw-semibold">

                                                    <input type="radio" name="teamLeader" class="form-check-input ms-2 leader-radio" data-name="นายสมชาย ใจดี">
                                                </div>
                                                <div class="text-muted small">
                                                    ตำแหน่ง: เจ้าหน้าที่บริหารงานทั่วไป (ฝ่ายบริหารหนี้)<br>
                                                    โทร: 081-234-5678
                                                </div>
                                            </div>
                                        </label>

                                        <label class="list-group-item d-flex align-items-start">
                                            <input class="form-check-input me-3 mt-1 member-checkbox" type="checkbox">
                                            <div class="flex-grow-1">
                                                <div class="fw-semibold">
                                                    น.ส.สุดา มีสุข
                                                    <span class="badge bg-success ms-1">เลือกหัวหน้าทีม</span>
                                                    <input type="radio" name="teamLeader" class="form-check-input ms-2 leader-radio" data-name="น.ส.สุดา มีสุข">
                                                </div>
                                                <div class="text-muted small">
                                                    ตำแหน่ง: เจ้าหน้าที่บัญชี ฝ่ายบัญชี<br>
                                                    โทร: 089-111-2233
                                                </div>
                                            </div>
                                        </label>

                                        <label class="list-group-item d-flex align-items-start">
                                            <input class="form-check-input me-3 mt-1 member-checkbox" type="checkbox">
                                            <div class="flex-grow-1">
                                                <div class="fw-semibold">
                                                    นายวิทยา เดินไว
                                                    <span class="badge bg-success ms-1">เลือกหัวหน้าทีม</span>
                                                    <input type="radio" name="teamLeader" class="form-check-input ms-2 leader-radio" data-name="นายวิทยา เดินไว">
                                                </div>
                                                <div class="text-muted small">
                                                    ตำแหน่ง: เจ้าหน้าที่บังคับคดี ฝ่ายบังคับคดี<br>
                                                    โทร: 086-555-8899
                                                </div>
                                            </div>
                                        </label>

                                        <label class="list-group-item d-flex align-items-start">
                                            <input class="form-check-input me-3 mt-1 member-checkbox" type="checkbox">
                                            <div class="flex-grow-1">
                                                <div class="fw-semibold">
                                                    น.ส.พรทิพย์ ศรีสุข
                                                    <span class="badge bg-success ms-1">เลือกหัวหน้าทีม</span>
                                                    <input type="radio" name="teamLeader" class="form-check-input ms-2 leader-radio" data-name="น.ส.พรทิพย์ ศรีสุข">
                                                </div>
                                                <div class="text-muted small">
                                                    ตำแหน่ง: หัวหน้ากลุ่มงานติดตามหนี้ชั้นบังคับคดี ฝ่ายบังคับคดี<br>
                                                    โทร: 082-999-0001
                                                </div>
                                            </div>
                                        </label>

                                        <label class="list-group-item d-flex align-items-start">
                                            <input class="form-check-input me-3 mt-1 member-checkbox" type="checkbox">
                                            <div class="flex-grow-1">
                                                <div class="fw-semibold">

                                                    <span class="badge bg-success ms-1">เลือกหัวหน้าทีม</span>
                                                    <input type="radio" name="teamLeader" class="form-check-input ms-2 leader-radio" data-name="นายปกรณ์ แสงชัย">
                                                </div>

                                                    ตำแหน่ง: หัวหน้ากลุ่มงานตรวจสอบปฏิบัติการ 1<br>
                                                    โทร: 087-222-4455
                                                </div>
                                            </div>
                                        </label>

                                    </div>
                                    <hr>

                                    <div class="alert alert-info py-2">
                                        เลือกสมาชิกที่ต้องการย้ายทีม
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">ย้ายไปทีม</label>
                                        <select class="form-select" id="targetTeam">
                                            <option value="" selected disabled>-- เลือกทีมปลายทาง --</option>
                                            <option value="teamA">ทีมภาคเหนือ A</option>
                                            <option value="teamB">ทีมภาคกลาง B</option>
                                            <option value="teamC">ทีมอีสาน C</option>
                                        </select>
                                    </div>
                                    <button class="btn btn-warning" onclick="moveMembers()">
                                    ย้ายสมาชิกไปทีมที่เลือก
                                    </button>

                                </div>

                                <hr>
                                <div class="d-flex justify-content-start gap-2">
                                    <button class="btn btn-primary">  บันทึกทีม</button>
                                    <button class="btn btn-outline-secondary">ยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    </div>

        <script src="js/jquery.min.js"></script> 
        <script src="js/popper.min.js" ></script>
        <script src="js/bootstrap.bundle.min.js"></script>   
        <script src="js/menu-mobile.js"></script>   
        <script src="js/menu.js"></script>   
        <script>
        renderMenu("menu-container");
        </script>
        <script>
        function filterTeamMembers(keyword) {
            keyword = keyword.toLowerCase()
            const items = document.querySelectorAll('#teamMemberList .list-group-item')

            items.forEach(item => {
                const text = item.innerText.toLowerCase()
                item.style.display = text.includes(keyword) ? '' : 'none'
            })
        }
        
        </script>
        <script>
            const memberCheckboxes = document.querySelectorAll('.member-checkbox');
            const leaderRadios = document.querySelectorAll('.leader-radio');
            const selectedCountEl = document.getElementById('selectedCount');
            const leaderNameEl = document.getElementById('leaderName');

            function updateSelectedCount() {
                const count = document.querySelectorAll('.member-checkbox:checked').length;
                selectedCountEl.textContent = count;
            }

            memberCheckboxes.forEach(cb => {
                cb.addEventListener('change', updateSelectedCount);
            });

            leaderRadios.forEach(radio => {
                radio.addEventListener('change', () => {
                    leaderNameEl.textContent = radio.dataset.name;
                });
            });
        </script>
        <script>
        function moveMembers() {
            const selectedMembers = document.querySelectorAll('.member-checkbox:checked');
            const targetTeam = document.getElementById('targetTeam').value;

            if (!targetTeam) {
                alert('กรุณาเลือกทีมปลายทาง');
                return;
            }

            if (selectedMembers.length === 0) {
                alert('กรุณาเลือกสมาชิกที่ต้องการย้าย');
                return;
            }

            // ตัวอย่าง validation
            // ถ้าหัวหน้าทีมโดนย้าย
            const leaderSelected = document.querySelector('.leader-radio:checked');
            if (leaderSelected) {
                alert('สมาชิกที่เป็นหัวหน้าทีม ต้องตั้งหัวหน้าทีมใหม่ก่อนย้าย');
                return;
            }

            // TODO: call API move member
            alert('ย้ายสมาชิกสำเร็จ');
        }
        </script>
