<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>เข้าสู่ระบบ | กยศ.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="css/bootstrap.min2.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"/>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            height: 100vh;
            margin: 0;
        }

        .login-wrapper {
            display: flex;
            height: 100vh;
        }

        /* LEFT */
        .login-bg {
            flex: 6;
            background: linear-gradient(
                rgba(31, 60, 136, 0.65),
                rgba(31, 60, 136, 0.65)
            ),
            url("images/login-bg.jpg") center/cover no-repeat;
            color: #fff;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-bg h1 {
            font-weight: 700;
            font-size: 36px;
        }

        .login-bg p {
            font-size: 18px;
            opacity: .9;
            max-width: 420px;
        }

        /* RIGHT */
        .login-form {
            flex: 4;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8fafc;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
        }

        .login-box h4 {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-box small {
            color: #64748b;
        }

        .form-control {
            height: 46px;
            border-radius: 10px;
        }

        .btn-primary {
            background: #1F3C88;
            border: none;
            height: 46px;
            border-radius: 10px;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: #162e6b;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .login-bg {
                display: none;
            }
            .login-form {
                flex: 1;
            }
        }
    </style>
</head>

<body>

    <div class="login-wrapper">

        <!-- LEFT IMAGE -->
        <div class="login-bg">
            <img src="images/logo.webp" width="80" class="mb-4" alt="">
            <h1>ระบบติดตามองค์กรนายจ้าง</h1>
            <p>
                สำหรับการลงพื้นที่ของ<br>
                ระบบติดตามองค์กรนายจ้าง สำหรับ
การลงพื้นที่
            </p>
        </div>

        <!-- RIGHT FORM -->
        <div class="login-form">
            <div class="login-box">

                <h4>เข้าสู่ระบบ</h4>
                <small>สำหรับเจ้าหน้าที่ กยศ.</small>

                <form class="mt-4">
                    <div class="mb-3">
                        <label class="form-label">ชื่อผู้ใช้งาน</label>
                        <input type="text" class="form-control" placeholder="Username">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">รหัสผ่าน</label>
                        <input type="password" class="form-control" placeholder="Password">
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" checked>
                            <label class="form-check-label">จดจำฉัน</label>
                        </div>
                        <a href="#" class="text-decoration-none text-muted">ลืมรหัสผ่าน?</a>
                    </div>

                    <button class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-1"></i> เข้าสู่ระบบ
                    </button>
                </form>

            </div>
        </div>

    </div>

</body>
</html>
